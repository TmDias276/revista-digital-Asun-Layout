<!doctype html>
<html lang="en">
<head>
    <title>Flipbook - 1080x1350</title>
    <meta name="description" content="Flipbook">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:image" content="https://www.flipbookpdf.net/web/files/flipbooks//1-thumb.jpg">
    <link href='https://fonts.googleapis.com/css?family=Indie+Flower|Open+Sans:400,700|Ubuntu:400,700|Great+Vibes' rel='stylesheet' type='text/css'>

    <script type="text/javascript" src="flipbook/extras/jquery.min.1.7.js"></script>
    <script type="text/javascript" src="flipbook/extras/jquery-ui-1.8.20.full.min.js"></script>
    <script type="text/javascript" src="flipbook/extras/modernizr.2.5.3.min.js"></script>
    <script type="text/javascript" src="flipbook/lib/hash.js"></script>
    <script type="text/javascript">
        var flipbookcfg = {
            url: "./data/",
            cover: 0,
            numPages: 8, // Ajustado para 8 páginas
            textTip: "Press ESC to exit. Use the keyboard arrows to change the page.",
            background: "./flipbook/files/backgrounds/back14.svg",
            showSlider: "null",
            showSocial: "null",
            showformat: "1",
            companyLogo: "",
            title: "",
            tagtitle: "Flipbook", 
            description: "", 
            showDownload: "null",
            backlink: "",
            opacity: "0.4",
            name: "7674e5df23b151ff48fa56766063134f7dd02342202411.pdf",
            direction: "ltr", 
            flipsound: "null", 
            widthimg: "1080", // Largura 1080px
            heightimg: "1350"  // Altura 1350px
        };
    </script>
    <style>
        body {
            overflow-y: scroll;
            background-color: #333;
            margin: 0;
            padding: 0;
        }
        ::-webkit-scrollbar {
            width: 8px; 
        }
        ::-webkit-scrollbar-track {
            background-color: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background-color: #888;
        }
        ::-webkit-scrollbar-thumb:hover {
            background-color: #555;
        }

        .logo-backs {
            opacity: 0.4;
        }

        /* Ajuste do container para o formato vertical */
        .magazine {
            width: 1080px;
            height: 1350px;
        }

        @media only screen and (max-width: 750px) {
            .flipbook-title {
                display: none!important;
            }
            .zoom-icon {
                display: none;
            }
            .controls-pdf {
                right: 20px!important;
            }
        }

        #ads {
            z-index: 100;
            position: fixed;
            bottom: 14px;
            text-align: center;
            padding: 2px;
            width: 100%;
        }

        /* Estilo do link de download centralizado */
        .download-link {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #000;
            color: #fff;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 30px;
            font-size: 16px;
            font-family: 'Ubuntu', sans-serif;
            z-index: 200;
            display: none; /* Escondido por padrão, aparece na última página */
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: background 0.3s;
        }

        .download-link:hover {
            background-color: #444;
        }
    </style>
</head>
<body>
    <div class="logo-backs"></div>
    <audio id="audio" src="flipbook/pics/page-flip.mp3"></audio>
    
    <a href="#">
        <img src="" style="position: absolute;bottom:15px;left: 15px;z-index: 100;height: auto; width: auto; max-width: 16%; max-height: 19%;">
    </a>

    <!-- Link de download -->
    <a href="https://alexalano.com.br/libretoessencial/AF_Alex_Show_Thiago.pdf" class="download-link" target="_blank">Clique para baixar em PDF</a>

    <div class="flipbook-title" style="display: none;">
        <h1></h1>
        <h2></h2>
        <p></p>
    </div>

    <div id="canvas">
        <div class="controls-pdf">
            <div class="controlzoom" style="display:none">
                <a href="#" id="zoomin" style="font-size:16px; color:#808080; text-decoration: none; font-weight:bold"><img src="flipbook/pics/zoomin.png" /></a>
                <a href="#" id="zoomout" style="font-size:16px; color:#808080; text-decoration: none; font-weight:bold"><img src="flipbook/pics/zoomout.png" /></a>
            </div>
            <a href="./PDF/7674e5df23b151ff48fa56766063134f7dd02342202411.pdf" target="_blank" ><img style="display:none;" src="flipbook/pics/down-pdf.png" /></a>
            <div class="zoom-icon zoom-icon-in"></div>
            <input type="image" class="fs" src="flipbook/pics/fs.png" onclick="openFullscreen();"/>
            <a href="#" id="prev"></a>
            <a href="#" id="next"></a>
        </div>
        <div class="magazine-viewport" id="flipfull">
            <div class="container">
                <div class="magazine">
                    <div ignore="1" class="next-button"></div>
                    <div ignore="1" class="previous-button"></div>
                </div>
            </div>
            <div class="bottom">
                <div id="slider-bar" class="turnjs-slider">
                    <div id="slider"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="flipbook/js/core.js"></script>
    <script type="text/javascript">
        yepnope({
            test: Modernizr.csstransforms,
            yep: ['flipbook/lib/turn.min.js'],
            nope: ['flipbook/lib/turn.html4.min.js', 'flipbook/css/jquery.ui.html4.css'],
            both: ['flipbook/lib/zoom.min.js', 'flipbook/css/jquery.ui.css', 'flipbook/js/magazineoff.js', 'flipbook/css/magazine.css'],
            complete: loadApp
        });

        // Lógica para mostrar o botão de download apenas na última página (8)
        $(document).on('turning', function(event, page, view) {
            var totalPages = flipbookcfg.numPages;
            var downloadLink = $(".download-link");

            // No Turn.js, 'page' é o número da página que está sendo aberta
            if (page === totalPages) {
                downloadLink.fadeIn(); 
            } else {
                downloadLink.fadeOut();
            }
        });
    </script>
    <script>
        var elem = document.getElementById("flipfull");
        function openFullscreen() {
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.mozRequestFullScreen) {
                elem.mozRequestFullScreen();
            } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) {
                elem.msRequestFullscreen();
            } else if (elem.webkitEnterFullscreen) {
                elem.webkitEnterFullscreen(); 
            }
        }
    </script>
</body>
</html>
